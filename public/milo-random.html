<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Milo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }
  </style>
</head>
<body>
  <iframe id="milo-frame" title="Milo"></iframe>
  <script>
    (function () {
      var pool = [2, 3, 4, 5, 6];
      var pick = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById("milo-frame").src = "/milo-" + pick + ".html";
    })();
  </script>
</body>
</html>
