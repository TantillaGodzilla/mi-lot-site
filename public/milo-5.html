<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milo — Shine</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }

  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 720px;
    height: 600px;
    position: relative;
  }

  @keyframes milo-float {
    0%,100% { transform: translateY(0);   }
    50%     { transform: translateY(-8%); }
  }
  @keyframes milo-sway {
    0%,100% { transform: rotate(0deg);    }
    25%     { transform: rotate(1.5deg);  }
    75%     { transform: rotate(-1.5deg); }
  }
  @keyframes milo-breathe {
    0%,100% { transform: translateX(-50%) scale(1);     }
    50%     { transform: translateX(-50%) scale(1.025); }
  }
  @keyframes milo-wiggle {
    0%,100% { transform: translateX(-50%) rotate(0deg)    scaleX(1.00); }
    10%     { transform: translateX(-50%) rotate(-3deg)   scaleX(1.03); }
    22%     { transform: translateX(-50%) rotate(0deg)    scaleX(0.98); }
    34%     { transform: translateX(-50%) rotate(2.5deg)  scaleX(1.03); }
    46%     { transform: translateX(-50%) rotate(0deg)    scaleX(0.99); }
    56%     { transform: translateX(-50%) rotate(-1.5deg) scaleX(1.02); }
    66%     { transform: translateX(-50%) rotate(0deg)    scaleX(1.00); }
    75%     { transform: translateX(-50%) rotate(1deg)    scaleX(1.01); }
    84%     { transform: translateX(-50%) rotate(0deg)    scaleX(1.00); }
  }
  @keyframes milo-shadow {
    0%,100% { transform: translateX(-50%) scaleX(1);    opacity: 0.45; }
    50%     { transform: translateX(-50%) scaleX(0.55); opacity: 0.18; }
  }
  @keyframes milo-glow {
    0%,100% { opacity: 0.5; transform: scale(1);    }
    50%     { opacity: 0.9; transform: scale(1.08); }
  }

  /* RIGHT to LEFT — starts off right edge, sweeps to left */
  @keyframes milo-sweep {
    0%,8%     { left: 120%; opacity: 0; }
    22%       { left: -60%; opacity: 1; }
    30%,100%  { left: -60%; opacity: 0; }
  }

  .milo-widget {
    position: relative;
    width: 280px;
    aspect-ratio: 1 / 0.85;
    animation:
      milo-float 4s ease-in-out infinite,
      milo-sway  7s ease-in-out infinite;
    transform-origin: center bottom;
  }

  .milo-glasses-wrap {
    position: absolute;
    top: 4%;
    left: 50%;
    width: 92%;
    transform: translateX(-50%);
    animation: milo-breathe 3.8s ease-in-out infinite;
    overflow: hidden;
  }

  .milo-glasses-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* glint sits over the glasses, animates via left property */
  @keyframes milo-sweep {
    0%,8%     { left: 120%; opacity: 0; }
    22%       { left: -60%; opacity: 1; }
    30%,100%  { left: -60%; opacity: 0; }
  }

  .milo-glint {
    position: absolute;
    top: 7.0%;
    left: 56.7%;
    width: 30.2%;
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    pointer-events: none;
    z-index: 999;
  }

  .milo-glint::before {
    content: '';
    position: absolute;
    top: -10%;
    width: 60%;
    height: 120%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.9), transparent);
    animation: milo-sweep 4s ease-in-out infinite;
    transform: skewX(-15deg);
  }

  .milo-glint2 {
    position: absolute;
    top: 5.7%;
    left: 14.1%;
    width: 30.2%;
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    z-index: 999;
  }

  .milo-glint2::before {
    content: '';
    position: absolute;
    top: -10%;
    width: 60%;
    height: 120%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
    animation: milo-sweep 4s ease-in-out infinite 0.4s;
    transform: skewX(-15deg);
  }

  .milo-mustache {
    position: absolute;
    top: 44%;
    left: 50%;
    width: 88%;
    height: auto;
    transform: translateX(-50%);
    
    transform-origin: center top;
  }

  .milo-shadow {
    position: absolute;
    bottom: 11%;
    left: 50%;
    width: 60%;
    height: 7%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(90,10,160,0.25) 0%, transparent 70%);
    animation: milo-shadow 4s ease-in-out infinite;
  }
</style>
</head>
