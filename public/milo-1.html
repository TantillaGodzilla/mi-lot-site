<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milo — Keyframe Animation</title>
<style>

  @keyframes float {
    0%   { transform: translateY(0px);   }
    50%  { transform: translateY(-16px); }
    100% { transform: translateY(0px);   }
  }

  @keyframes sway {
    0%   { transform: rotate(0deg);    }
    25%  { transform: rotate(1.5deg);  }
    75%  { transform: rotate(-1.5deg); }
    100% { transform: rotate(0deg);    }
  }

  @keyframes breathe {
    0%   { transform: translateX(-50%) scale(1.000); }
    50%  { transform: translateX(-50%) scale(1.025); }
    100% { transform: translateX(-50%) scale(1.000); }
  }

  @keyframes wiggle {
    0%   { transform: translateX(-50%) rotate(0deg)    scaleX(1.00) translateY(0px);  }
    10%  { transform: translateX(-50%) rotate(-3deg)   scaleX(1.03) translateY(-1px); }
    22%  { transform: translateX(-50%) rotate(0deg)    scaleX(0.98) translateY(0px);  }
    34%  { transform: translateX(-50%) rotate(2.5deg)  scaleX(1.03) translateY(-1px); }
    46%  { transform: translateX(-50%) rotate(0deg)    scaleX(0.99) translateY(0px);  }
    56%  { transform: translateX(-50%) rotate(-1.5deg) scaleX(1.02) translateY(-1px); }
    66%  { transform: translateX(-50%) rotate(0deg)    scaleX(1.00) translateY(0px);  }
    75%  { transform: translateX(-50%) rotate(1deg)    scaleX(1.01) translateY(0px);  }
    84%  { transform: translateX(-50%) rotate(0deg)    scaleX(1.00) translateY(0px);  }
    100% { transform: translateX(-50%) rotate(0deg)    scaleX(1.00) translateY(0px);  }
  }

  @keyframes shadow {
    0%   { transform: translateX(-50%) scaleX(1.0);  opacity: 0.45; }
    50%  { transform: translateX(-50%) scaleX(0.55); opacity: 0.18; }
    100% { transform: translateX(-50%) scaleX(1.0);  opacity: 0.45; }
  }

  @keyframes glow {
    0%   { opacity: 0.5; transform: scale(1.00); }
    50%  { opacity: 0.9; transform: scale(1.08); }
    100% { opacity: 0.5; transform: scale(1.00); }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f3eeff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .milo {
    position: relative;
    width: 300px;
    height: 240px;
    animation:
      float 4s  ease-in-out infinite,
      sway  7s  ease-in-out infinite;
    transform-origin: center bottom;
  }

  .glow {
    position: absolute;
    inset: -50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, transparent 65%);
    animation: glow 4s ease-in-out infinite;
    pointer-events: none;
  }

  .glasses {
    position: absolute;
    top: 10px;
    left: 50%;
    width: 92%;
    height: auto;
    transform: translateX(-50%);
    animation: breathe 3.8s ease-in-out infinite;
    transform-origin: center center;
  }

  .mustache {
    position: absolute;
    top: 106px;
    left: 50%;
    width: 88%;
    height: auto;
    transform: translateX(-50%);
    animation: wiggle 2.2s ease-in-out infinite;
    transform-origin: center top;
  }

  .shadow {
    position: absolute;
    bottom: 32px;
    left: 50%;
    width: 180px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(90,10,160,0.25) 0%, transparent 70%);
    animation: shadow 4s ease-in-out infinite;
  }

</style>
</head>
